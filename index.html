<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laras Wortzauber - Lern-App für Kinder</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5f27cd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Laras Wortzauber">
    
    <!-- Icons für iOS -->
    <link rel="apple-touch-icon" href="icon_192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icon_192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icon_512.png">
    
    <!-- Standard Favicon -->
    <link rel="icon" type="image/png" href="icon_192.png">
    
    <link rel="stylesheet" href="styles.css?v=44">
</head>
<body>
    <canvas id="background"></canvas>
    <div id="stars"></div>
    <div id="fireworks"></div>
    
    <div class="app-container">
        <div class="header-container">
            <div class="header-content">
                <h1 class="title">Laras Wortzauber</h1>
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="free" onclick="setMode('free')">Freies Schreiben</button>
                    <button class="mode-btn" data-mode="copy" onclick="setMode('copy')">Wörter Nachschreiben</button>
                </div>
            </div>
        </div>
        
        <div class="success-message" id="success-message">
            <img class="success-image" id="success-image" src="Stern.png" alt="">
            <span class="success-text">Super gemacht!</span>
        </div>
        
        <div class="completion-message" id="completion-message"></div>
        
        <div class="game-area">
            <div class="collection-slots">
                <div class="collection-slot" data-index="0">?</div>
                <div class="collection-slot" data-index="1">?</div>
                <div class="collection-slot" data-index="2">?</div>
                <div class="collection-slot" data-index="3">?</div>
                <div class="collection-slot" data-index="4">?</div>
                <div class="collection-slot" data-index="5">?</div>
            </div>
            
            <div class="game-content">
                <div class="setzkasten-wrapper">
                    <div class="setzkasten" id="setzkasten">
                        <div class="row" data-row="0">
                            <div class="grid-slot" data-col="0"></div>
                            <div class="grid-slot" data-col="1"></div>
                            <div class="grid-slot" data-col="2"></div>
                            <div class="grid-slot" data-col="3"></div>
                            <div class="grid-slot" data-col="4"></div>
                            <div class="grid-slot" data-col="5"></div>
                            <div class="grid-slot" data-col="6"></div>
                            <div class="grid-slot" data-col="7"></div>
                            <div class="grid-slot" data-col="8"></div>
                            <div class="grid-slot" data-col="9"></div>
                        </div>
                        <div class="row" data-row="1">
                            <div class="grid-slot" data-col="0"></div>
                            <div class="grid-slot" data-col="1"></div>
                            <div class="grid-slot" data-col="2"></div>
                            <div class="grid-slot" data-col="3"></div>
                            <div class="grid-slot" data-col="4"></div>
                            <div class="grid-slot" data-col="5"></div>
                            <div class="grid-slot" data-col="6"></div>
                            <div class="grid-slot" data-col="7"></div>
                            <div class="grid-slot" data-col="8"></div>
                            <div class="grid-slot" data-col="9"></div>
                        </div>
                        <div class="row" data-row="2">
                            <div class="grid-slot" data-col="0"></div>
                            <div class="grid-slot" data-col="1"></div>
                            <div class="grid-slot" data-col="2"></div>
                            <div class="grid-slot" data-col="3"></div>
                            <div class="grid-slot" data-col="4"></div>
                            <div class="grid-slot" data-col="5"></div>
                            <div class="grid-slot" data-col="6"></div>
                            <div class="grid-slot" data-col="7"></div>
                            <div class="grid-slot" data-col="8"></div>
                            <div class="grid-slot" data-col="9"></div>
                        </div>
                    </div>
                    <button class="icon-btn reset-btn" onclick="resetSetzkasten()" title="Zurücksetzen">🔄</button>
                </div>
                
                <div class="keyboard-wrapper">
                    <div class="kacheln-container">
                        <div class="kacheln" id="kacheln"></div>
                        <div class="kacheln multiletter-row" id="multiletter-row">
                            <div class="keyboard-row">
                                <div class="kachel consonant multiletter" data-letters="SCH">SCH</div>
                                <div class="kachel consonant multiletter" data-letters="CH">CH</div>
                                <div class="kachel vowel multiletter" data-letters="EI">EI</div>
                                <div class="kachel vowel multiletter" data-letters="AU">AU</div>
                                <div class="kachel vowel multiletter" data-letters="EU">EU</div>
                            </div>
                        </div>
                    </div>
                    <div class="keyboard-side-btns">
                        <button class="icon-btn toggle-multiletter-btn" id="toggle-multiletter-btn" onclick="toggleMultiletterRow()" title="Mehrfachlaute">🔤</button>
                        <button class="icon-btn click-toggle-btn" id="click-toggle-btn" onclick="toggleClickMode()" title="Klicken & Platzieren">👆</button>
                        <button class="icon-btn hint-btn" id="hint-btn" onclick="toggleHintMode()" title="Hinweis">💡</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app-ipad.js?v=28"></script>
    <script>
        // Service Worker registrieren
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker registriert:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker Registrierung fehlgeschlagen:', error);
                    });
            });
        }
    </script>
</body>
</html>
